<body>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAK9Znr_UrKn9RpK7ofrYWRVunorc7VJ-Q",
    authDomain: "gateprep-ai-79ba8.firebaseapp.com",
    projectId: "gateprep-ai-79ba8",
    storageBucket: "gateprep-ai-79ba8.firebasestorage.app",
    messagingSenderId: "124431771601",
    appId: "1:124431771601:web:b4f515859d8ad8f26ee2f0",
    measurementId: "G-Q965ZXVEJ5"
  };
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      // Login nahi hai to direct Google popup khol do
      signInWithPopup(auth, provider)
        .then((result) => {
          console.log("Login success:", result.user.email);
        })
        .catch((error) => {
          console.error("Login failed:", error);
          alert("Login failed. Page refresh karke dobara try karo.");
        });
    } else {
      console.log("Already logged in:", user.email);
    }
  });
</script>
    <script src="script.js"></script>

</body>
